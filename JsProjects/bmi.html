<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        h2{
            font-size: inherit;
            margin: auto;
            padding-top: .5rem;
            padding-bottom: 1.2rem;
        }
        .bmi-form {
            display: flex;
            position: absolute;
            top: 30%;
            right: 25%;
            transform: translate(-25%,-25%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: auto;
            border: 2px solid;
        }

        form {
            display: flex;
            align-items: center;
            flex-direction: column;
            height: 125px;
            width: 30vw;
            margin: auto;
        }
        form input{
            height: 10px;
            width: 100px;
        }
        button{
            width: 60px;
        }
    </style>
</head>

<body>
    <div class="bmi-form">
        <h2>BMI CALCULATOR</h2>
        <form>
            <label for="height">Enter Height in CM</label>
            <input id="height" type="text">
            <br>
            <label for="weight">Enter Weight in KG</label>
            <input id="weight" type="text">
            <br>
            <button type="submit">Calculate</button>
        </form><br>
        <span id="result" >Result</span>
    </div>
    <script type="module" src="bmi.js"></script>
</body>

</html>
