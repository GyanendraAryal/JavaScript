<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG-CHANGER</title>
    <style>
        .wrapper{
            height: 90vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: end;
            gap: 2rem;
        }
        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid;
            border-radius: 10px;
            gap: 2rem;
            width: 100px;
            height: 25px;
            color: white;
            cursor:pointer;
            /* padding-bottom: 2rem; */
        }
        .green{
            background-color: green;
        }
        .blue{
            background-color: blue;
        }
        .grey{
            background-color: grey;
        }
        .yellow{
            background-color: yellow;
            color: black;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div id="green" class="button green">Green</div>
        <div id="yellow" class="button yellow">Yellow</div>
        <div id="grey" class="button grey">Grey</div>
        <div id="blue" class="button blue">Blue</div>
    </div>
    <script type="module" src="bg-changer.js"></script>
</body>

</html>
