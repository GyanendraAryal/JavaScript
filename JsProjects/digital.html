<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalClock</title>
    <style>
        .time-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .clock {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            width: 150px;
            border-radius: 2px;
            border: 2px solid rgb(0, 0, 0);
            background-color: yellow;
        }
    </style>
</head>

<body>
    <div class="time-wrapper">
        <h1>Digital Clock</h1>
        <div class="clock"></div>
    </div>
    <script type="module" src="./digital.js"></script>
</body>

</html>
